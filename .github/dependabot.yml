version: 2
updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    ignore:
      # EDT 2025.2 and this build intentionally target Java 17.
      - dependency-name: "org.eclipse.tycho:*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "com.puppycrawl.tools:checkstyle"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
