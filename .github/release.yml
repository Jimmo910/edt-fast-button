# Currently unused: the Release workflow builds notes from CHANGELOG_RU.md via --notes-file instead of
# --generate-notes, so this auto-notes category configuration is not consulted.
changelog:
  categories:
    - title: New features
      labels: [enhancement]
    - title: Bug fixes
      labels: [bug]
    - title: Documentation
      labels: [documentation]
    - title: Other changes
      labels: ['*']
  exclude:
    labels: [skip-changelog]
