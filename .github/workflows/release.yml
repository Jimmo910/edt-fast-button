# SPDX-License-Identifier: EPL-2.0
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Release p2 archive
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Validate release version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          pom_version="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          if [[ "$pom_version" != "${version}-SNAPSHOT" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match Maven version $pom_version." >&2
            exit 1
          fi
          if ! grep -q "version=\"${version}.qualifier\"" features/ru.jimmo.edt.fastbutton.feature/feature.xml; then
            echo "Tag $GITHUB_REF_NAME does not match the installable feature version." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "qualifier=v${GITHUB_SHA:0:12}" >> "$GITHUB_OUTPUT"

      - name: Build release
        run: >-
          mvn -B -ntp
          -DforceContextQualifier=${{ steps.version.outputs.qualifier }}
          clean verify

      - name: Prepare release archive
        shell: bash
        run: |
          mkdir dist
          archive="edt-fast-button-${{ steps.version.outputs.version }}.zip"
          cp repositories/ru.jimmo.edt.fastbutton.repository/target/ru.jimmo.edt.fastbutton.repository.zip "dist/$archive"
          (cd dist && sha256sum "$archive" > "$archive.sha256")

      - name: Prepare Russian release notes
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          awk -v ver="$version" '
            $0 ~ ("^## \\[" ver "\\]") { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG_RU.md > dist/notes.md
          if [[ ! -s dist/notes.md ]]; then
            echo "::error::No CHANGELOG_RU.md section for ${version}." >&2
            exit 1
          fi

      - name: Attest release archive
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/edt-fast-button-${{ steps.version.outputs.version }}.zip

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          dist/edt-fast-button-${{ steps.version.outputs.version }}.zip
          dist/edt-fast-button-${{ steps.version.outputs.version }}.zip.sha256
          --verify-tag
          --notes-file dist/notes.md
          --title "Быстрые кнопки ${{ steps.version.outputs.version }}"
