# SPDX-License-Identifier: EPL-2.0
name: SonarQube Cloud

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sonar-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: SonarQube Cloud analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DEPENDABOT_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]' }}
    steps:
      # GitHub withholds Actions secrets from Dependabot pull requests. Keep the
      # required check explicit and successful; Build and CodeQL still validate
      # the dependency change, and Sonar analyzes the resulting main branch.
      - name: Skip analysis for Dependabot pull requests
        if: env.DEPENDABOT_PR == 'true'
        run: echo "Sonar analysis is deferred until this dependency update reaches main."

      - name: Check out full history
        if: env.DEPENDABOT_PR != 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 17
        if: env.DEPENDABOT_PR != 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Validate Sonar authentication
        if: env.DEPENDABOT_PR != 'true'
        shell: bash
        run: |
          if [[ -z "$SONAR_TOKEN" ]]; then
            echo "::error::SONAR_TOKEN is missing or empty."
            exit 1
          fi

      - name: Build and analyze
        if: env.DEPENDABOT_PR != 'true'
        run: >-
          mvn -B -ntp
          -Dsonar.qualitygate.wait=true
          -Dsonar.qualitygate.timeout=300
          clean verify sonar:sonar
